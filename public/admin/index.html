<!doctype html>
<html lang="es">
{{>head}}
<body class="admin-page">
  <div class="admin-layout">
    {{>admin-sidebar}}
    <main class="admin-content">
      <div class="admin-content-header">
        <h1>Dashboard</h1>
        <p class="admin-content-subtitle">Panel de administración de Recursos Canarias</p>
      </div>

      <div class="admin-dashboard-grid">
        <a class="admin-dashboard-card" href="/admin/recursos">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          <span class="admin-dashboard-card__label">Recursos</span>
          <span class="admin-dashboard-card__action">Gestionar →</span>
        </a>
        <a class="admin-dashboard-card" href="/admin/blog">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span class="admin-dashboard-card__label">Blog</span>
          <span class="admin-dashboard-card__action">Gestionar →</span>
        </a>
        <a class="admin-dashboard-card" href="/admin/suscriptores">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="admin-dashboard-card__label">Suscriptores</span>
          <span class="admin-dashboard-card__action">Ver lista →</span>
        </a>
        <a class="admin-dashboard-card" href="/admin/mensajes">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="admin-dashboard-card__label">Mensajes</span>
          <span class="admin-dashboard-card__action">Ver mensajes →</span>
        </a>
      </div>
    </main>
  </div>
  <script src="/js/admin.js" defer></script>
</body>
</html>
