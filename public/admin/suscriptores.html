<!doctype html>
<html lang="es">
{{>head}}
<body class="admin-page">
  <div class="admin-layout">
    {{>admin-sidebar}}
    <main class="admin-content">
      <div class="admin-content-header">
        <h1>Suscriptores</h1>
        <p class="admin-content-subtitle">Listado de personas suscritas a novedades por correo electrónico.</p>
      </div>

      <div class="admin-toolbar">
        <p id="results-count" class="admin-results-count" aria-live="polite"></p>
        <button id="btn-csv" class="admin-secondary-btn" type="button">Exportar CSV</button>
      </div>

      <p id="list-error" class="admin-error-msg" hidden></p>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th scope="col">Email</th>
              <th scope="col">Fecha de alta</th>
              <th scope="col">Estado</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr class="admin-table-empty"><td colspan="3">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="admin-pagination">
        <button id="btn-more" class="admin-secondary-btn" type="button" hidden>
          Cargar más
        </button>
      </div>
    </main>
  </div>

  <script src="/js/admin.js" defer></script>
  <script src="/js/admin-suscriptores.js" defer></script>
</body>
</html>
